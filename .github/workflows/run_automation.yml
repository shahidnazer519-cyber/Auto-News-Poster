name: Auto News Poster

on:
  schedule:
    # Har 1 ghante baad automatic chalega (UTC time)
    - cron: '0 * * * *'
  workflow_dispatch: # Is se aap manually bhi button daba kar run kar sakte hain

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Automation Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python src/auto_news_poster.py
